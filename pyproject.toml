[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
# Migrado para a subseção correta conforme o aviso do Ruff
select = ["E", "W", "F", "I", "B", "C4", "UP", "D", "N"]
ignore = []

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--cov=app --cov-report=term-missing --cov-report=html"